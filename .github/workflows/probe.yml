name: probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch nitter RSS
        run: |
          for url in "https://nitter.net/neet_sol/rss" "https://xcancel.com/neet_sol/rss" "https://nitter.tiekoetter.com/neet_sol/rss"; do
            echo "=== $url ==="
            curl -s -m 20 -A "Mozilla/5.0 (X11; Linux x86_64; rv:109.0) Gecko/20100101 Firefox/119.0" -o body.txt -w "HTTP %{http_code}, %{size_download} bytes\n" "$url" || true
            head -c 300 body.txt; echo
          done
